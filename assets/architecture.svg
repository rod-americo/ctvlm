<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-label="ctvlm architecture diagram">
<defs>
<linearGradient id="enc1" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/>
</linearGradient>
<linearGradient id="enc2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/>
</linearGradient>
<linearGradient id="mlp" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/>
</linearGradient>
<linearGradient id="cal" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#fbcfe8"/>
</linearGradient>
<linearGradient id="out" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#3b82f6"/>
</linearGradient>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
</marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
<feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
<feOffset dx="0" dy="2" result="off"/>
<feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<style>
.t { font-family: ui-sans-serif,system-ui,Helvetica,Arial; }
.title { font-size: 16px; font-weight: 700; fill: #0f172a; }
.subtitle { font-size: 12px; fill: #475569; }
.label { font-size: 13px; font-weight: 600; fill: #334155; }
.small { font-size: 11px; fill: #64748b; }
.dim-tag { font-size: 11px; font-weight: 600; fill: #475569; }
.line { stroke: #94a3b8; stroke-width: 2; fill: none; }
.line-h { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
.fz { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #1e293b; }
</style>
<rect width="1100" height="720" fill="#fafbfc"/>
<!-- INPUT -->
<g transform="translate(450,20)">
<rect x="0" y="0" width="200" height="56" rx="10" fill="#1e293b"/>
<text x="100" y="24" text-anchor="middle" class="t" font-size="13" font-weight="600" fill="white">DICOM series</text>
<text x="100" y="42" text-anchor="middle" class="t" font-size="11" fill="#cbd5e1">→ canonical-RAS NIfTI (dcm2niix)</text>
</g>
<line x1="550" y1="76" x2="550" y2="106" class="line" marker-end="url(#arrow)"/>
<!-- TWO ENCODERS row -->
<g transform="translate(80,120)" filter="url(#shadow)">
<rect x="0" y="0" width="380" height="160" rx="14" fill="url(#enc1)" stroke="#3b82f6" stroke-width="2"/>
<text x="20" y="32" class="t title">Vision encoder #1 — Merlin</text>
<text x="20" y="54" class="t subtitle">stanfordmimi/Merlin · MIT · frozen</text>
<text x="20" y="84" class="t small">3D I3D-inflated ResNet-152</text>
<text x="20" y="104" class="t small">Pretrained image+text contrastive (CT-RATE)</text>
<text x="20" y="124" class="t small">Resample 1.5×1.5×3 mm, HU clip, 224³</text>
<g transform="translate(20,138)">
<rect x="0" y="0" width="120" height="20" rx="10" fill="#1e3a8a"/>
<text x="60" y="14" text-anchor="middle" class="t" font-size="11" font-weight="700" fill="white">global_2048</text>
</g>
<text x="160" y="153" class="t small">global avg-pool · fp16</text>
</g>
<g transform="translate(640,120)" filter="url(#shadow)">
<rect x="0" y="0" width="380" height="160" rx="14" fill="url(#enc2)" stroke="#16a34a" stroke-width="2"/>
<text x="20" y="32" class="t title">Vision encoder #2 — Pillar-0</text>
<text x="20" y="54" class="t subtitle">YalaLab/Pillar0-AbdomenCT · permissive · frozen</text>
<text x="20" y="84" class="t small">ViT-L Atlas abdomen-CT encoder</text>
<text x="20" y="104" class="t small">Resample 384³, 11 CT windows</text>
<text x="20" y="124" class="t small">extract_vision_feats (L2-normed output)</text>
<g transform="translate(20,138)">
<rect x="0" y="0" width="100" height="20" rx="10" fill="#166534"/>
<text x="50" y="14" text-anchor="middle" class="t" font-size="11" font-weight="700" fill="white">emb_1152</text>
</g>
<text x="140" y="153" class="t small">3-scale concat · fp16</text>
</g>
<!-- L2 + concat -->
<path d="M270,280 L420,320" class="line" marker-end="url(#arrow)"/>
<path d="M830,280 L680,320" class="line" marker-end="url(#arrow)"/>
<g transform="translate(380,300)">
<rect x="0" y="0" width="120" height="32" rx="16" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
<text x="60" y="20" text-anchor="middle" class="t" font-size="12" font-weight="600" fill="#334155">L2 normalise</text>
</g>
<g transform="translate(600,300)">
<rect x="0" y="0" width="120" height="32" rx="16" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
<text x="60" y="20" text-anchor="middle" class="t" font-size="12" font-weight="600" fill="#334155">L2 normalise</text>
</g>
<line x1="440" y1="332" x2="510" y2="360" class="line" marker-end="url(#arrow)"/>
<line x1="660" y1="332" x2="590" y2="360" class="line" marker-end="url(#arrow)"/>
<!-- CONCAT box -->
<g transform="translate(440,360)" filter="url(#shadow)">
<rect x="0" y="0" width="220" height="44" rx="8" fill="#0f172a"/>
<text x="110" y="20" text-anchor="middle" class="t" font-size="13" font-weight="700" fill="white">concat → 3200-d</text>
<text x="110" y="36" text-anchor="middle" class="t" font-size="10" fill="#cbd5e1">[ L2(merlin_2048) ‖ L2(pillar0_1152) ]</text>
</g>
<line x1="550" y1="404" x2="550" y2="440" class="line" marker-end="url(#arrow)"/>
<!-- MLP HEAD -->
<g transform="translate(360,442)" filter="url(#shadow)">
<rect x="0" y="0" width="380" height="80" rx="12" fill="url(#mlp)" stroke="#f59e0b" stroke-width="2"/>
<text x="190" y="28" text-anchor="middle" class="t title">MLP head — the only trainable layer</text>
<text x="190" y="48" text-anchor="middle" class="t small">Linear(3200 → 220) · BCE + per-class pos_weight</text>
<text x="190" y="66" text-anchor="middle" class="t small">~700k params · trains in ~30 s on a 3090</text>
</g>
<line x1="550" y1="522" x2="550" y2="556" class="line" marker-end="url(#arrow)"/>
<g transform="translate(450,560)">
<rect x="0" y="0" width="200" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
<text x="100" y="20" text-anchor="middle" class="t" font-size="12" font-weight="600" fill="#7c2d12">raw_logits[220]</text>
</g>
<line x1="550" y1="590" x2="550" y2="622" class="line" marker-end="url(#arrow)"/>
<!-- CALIBRATION -->
<g transform="translate(160,624)" filter="url(#shadow)">
<rect x="0" y="0" width="780" height="56" rx="12" fill="url(#cal)" stroke="#db2777" stroke-width="2"/>
<text x="390" y="22" text-anchor="middle" class="t title">Per-finding calibration (post-hoc, frozen)</text>
<text x="390" y="42" text-anchor="middle" class="t small">Platt sigmoid(A·logit + B) · Youden-J operating points · min-floor 0.20 · phase-aware (CE vs NC)</text>
</g>
<!-- Output to right -->
<line x1="940" y1="200" x2="980" y2="200" class="line-h" marker-end="url(#arrow)"/>
<line x1="160" y1="200" x2="120" y2="200" class="line-h" marker-end="url(#arrow)"/>
<!-- DOWNSTREAM PIPELINE -->
<g transform="translate(380,700)">
<text x="170" y="0" text-anchor="middle" class="t small">⮕ COREQUIRES + SUBSUMPTION + per-category cap ⮕ Tier A / B template render ⮕ FINDINGS</text>
</g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="ctvlm end-to-end data pipeline">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
</marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
<feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
<feOffset dx="0" dy="1" result="off"/>
<feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<style>
.t { font-family: ui-sans-serif,system-ui,Helvetica,Arial; }
.stage-num { font-size: 22px; font-weight: 800; fill: white; }
.stage-title { font-size: 13.5px; font-weight: 700; fill: #0f172a; }
.stage-desc { font-size: 11.5px; fill: #475569; }
.stage-time { font-size: 11px; font-style: italic; fill: #64748b; }
</style>
<rect width="1200" height="320" fill="#fafbfc"/>
<text x="600" y="36" text-anchor="middle" class="t" font-size="20" font-weight="700" fill="#0f172a">End-to-end pipeline · ~5 s warm / ~40 s cold per study</text>
<!-- Stage 1: Intake -->
<g transform="translate(40,80)" filter="url(#shadow)">
<rect x="0" y="0" width="180" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<g transform="translate(20,20)"><circle cx="14" cy="14" r="14" fill="#3b82f6"/><text x="14" y="20" text-anchor="middle" class="t stage-num">1</text></g>
<text x="20" y="74" class="t stage-title">Intake</text>
<text x="20" y="94" class="t stage-desc">Orthanc hook fires</text>
<text x="20" y="110" class="t stage-desc">Filter: CT abdomen-pelvis</text>
<text x="20" y="126" class="t stage-desc">Tag contrast phase</text>
<text x="20" y="142" class="t stage-desc">Publish to broker</text>
<text x="20" y="168" class="t stage-time">&lt; 50 ms</text>
</g>
<line x1="220" y1="170" x2="248" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 2: DICOM → NIfTI -->
<g transform="translate(250,80)" filter="url(#shadow)">
<rect x="0" y="0" width="180" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<g transform="translate(20,20)"><circle cx="14" cy="14" r="14" fill="#3b82f6"/><text x="14" y="20" text-anchor="middle" class="t stage-num">2</text></g>
<text x="20" y="74" class="t stage-title">DICOM → NIfTI</text>
<text x="20" y="94" class="t stage-desc">dcm2niix conversion</text>
<text x="20" y="110" class="t stage-desc">Canonical-RAS reorient</text>
<text x="20" y="126" class="t stage-desc">Write to /ct_volumes/</text>
<text x="20" y="142" class="t stage-desc">Persistent cache</text>
<text x="20" y="168" class="t stage-time">1 – 5 s</text>
</g>
<line x1="430" y1="170" x2="458" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 3: Encoders -->
<g transform="translate(460,80)" filter="url(#shadow)">
<rect x="0" y="0" width="220" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<g transform="translate(20,20)"><circle cx="14" cy="14" r="14" fill="#3b82f6"/><text x="14" y="20" text-anchor="middle" class="t stage-num">3</text></g>
<text x="20" y="74" class="t stage-title">Two encoder forwards</text>
<g transform="translate(20,86)">
<rect x="0" y="0" width="80" height="22" rx="11" fill="#dbeafe"/>
<text x="40" y="14" text-anchor="middle" class="t" font-size="10" font-weight="700" fill="#1e3a8a">Merlin 2048</text>
</g>
<g transform="translate(108,86)">
<rect x="0" y="0" width="80" height="22" rx="11" fill="#dcfce7"/>
<text x="40" y="14" text-anchor="middle" class="t" font-size="10" font-weight="700" fill="#166534">Pillar-0 1152</text>
</g>
<text x="20" y="128" class="t stage-desc">Cache .npy to disk</text>
<text x="20" y="144" class="t stage-desc">Auto-skip if cached</text>
<text x="20" y="168" class="t stage-time">3 – 5 s cold · &lt; 100 ms warm</text>
</g>
<line x1="680" y1="170" x2="708" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 4: Probe + calibration -->
<g transform="translate(710,80)" filter="url(#shadow)">
<rect x="0" y="0" width="220" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<g transform="translate(20,20)"><circle cx="14" cy="14" r="14" fill="#3b82f6"/><text x="14" y="20" text-anchor="middle" class="t stage-num">4</text></g>
<text x="20" y="74" class="t stage-title">MLP + calibration</text>
<text x="20" y="94" class="t stage-desc">L2 concat → 3200-d</text>
<text x="20" y="110" class="t stage-desc">MLP head → 220 logits</text>
<text x="20" y="126" class="t stage-desc">Per-finding Platt scaling</text>
<text x="20" y="142" class="t stage-desc">Youden-J + min-floor</text>
<text x="20" y="168" class="t stage-time">&lt; 50 ms</text>
</g>
<line x1="930" y1="170" x2="958" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 5: Router + render -->
<g transform="translate(960,80)" filter="url(#shadow)">
<rect x="0" y="0" width="200" height="180" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<g transform="translate(20,20)"><circle cx="14" cy="14" r="14" fill="#3b82f6"/><text x="14" y="20" text-anchor="middle" class="t stage-num">5</text></g>
<text x="20" y="74" class="t stage-title">Router + render</text>
<text x="20" y="94" class="t stage-desc">Recipe per finding</text>
<text x="20" y="110" class="t stage-desc">Tool calls + Grad-CAM</text>
<text x="20" y="126" class="t stage-desc">Tier A / B template</text>
<text x="20" y="142" class="t stage-desc">Anatomical ordering</text>
<text x="20" y="168" class="t stage-time">0.2 – 30 s</text>
</g>
<!-- Footer -->
<text x="600" y="296" text-anchor="middle" class="t" font-size="12" fill="#64748b">Every finding sentence is traceable to a tool result + Grad-CAM heatmap (full audit log in the FullReport dataclass)</text>
</svg>

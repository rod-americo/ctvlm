# ctvlm deployment profile for thor.
#
# Default host layout:
#   app checkout: this repository
#   persistent data: /srv/ctvlm/{work,hf_cache}
#
# Run from the repository root:
#   cp .env.example .env
#   docker compose -f docker-compose.thor.yml up -d viewer

version: "3.9"

x-shared-env: &shared-env
  CTVLM_WORK_ROOT: /opt/ctvlm/work
  CTVLM_MERLIN_ROOT: /opt/ctvlm/work/ct_volumes
  CTVLM_MERLIN_PLUS_DIR: /opt/ctvlm/work/organ_masks
  CTVLM_MASKS_DIR: /opt/ctvlm/work/organ_masks
  CTVLM_CHECKPOINTS_DIR: /opt/ctvlm/checkpoints
  CTVLM_HF_CACHE: /opt/ctvlm/hf_cache
  CTVLM_LOGS_DIR: /opt/ctvlm/work/logs
  CTVLM_REPORTS_DIR: /opt/ctvlm/work/reports_out
  HF_HOME: /opt/ctvlm/hf_cache
  HF_HUB_DISABLE_TELEMETRY: "1"
  HF_TOKEN: ${HF_TOKEN}
  RAVE_WIN: ${RAVE_WIN:-}
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-shared-volumes: &shared-volumes
  - ${CTVLM_HOST_ROOT:-/srv/ctvlm}/work:/opt/ctvlm/work
  - ${CTVLM_HOST_ROOT:-/srv/ctvlm}/hf_cache:/opt/ctvlm/hf_cache
  - ./checkpoints:/opt/ctvlm/checkpoints:ro

services:
  viewer:
    build:
      context: .
      target: viewer
    image: ctvlm-viewer:0.2.0
    ports:
      - "${CTVLM_VIEWER_BIND:-127.0.0.1}:8501:8501"
      - "${CTVLM_FILESERVER_BIND:-127.0.0.1}:8502:8502"
    volumes: *shared-volumes
    environment:
      <<: *shared-env
      CTVLM_UPLOAD_WORK: /opt/ctvlm/work
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    image: ctvlm-worker:0.2.0
    volumes: *shared-volumes
    environment:
      <<: *shared-env
      CTVLM_MAX_FINDINGS: ${CTVLM_MAX_FINDINGS:-12}
      CTVLM_REDIS_URL: ${CTVLM_REDIS_URL:-}
      CTVLM_BROKER_QUEUE: ${CTVLM_BROKER_QUEUE:-ctvlm.jobs}
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    restart: unless-stopped
    stdin_open: true
    tty: true
